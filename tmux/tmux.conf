# ── General ───────────────────────────────────────────────────────
set -g mouse on
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on

# ── Status bar ────────────────────────────────────────────────────
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#111111,fg=#cdd6f4"

# Left: session name (blue badge)
set -g status-left-length 30
set -g status-left "#[fg=#111111,bg=#89b4fa,bold]  #S #[fg=#89b4fa,bg=#111111,nobold]"

# Right: time + host
set -g status-right-length 50
set -g status-right "#[fg=#45475a,bg=#111111]#[fg=#cdd6f4,bg=#45475a] %H:%M #[fg=#89b4fa,bg=#45475a]#[fg=#111111,bg=#89b4fa,bold] #h "

# ── Window tabs ───────────────────────────────────────────────────
set -g window-status-separator ""

# Active window: green pill + bold
# Requires Nerd Font (nerdfont-v3 / powerline glyphs)
set -g window-status-current-format "#[fg=#111111,bg=#a6e3a1]#[fg=#111111,bg=#a6e3a1,bold] #I:#W#{?window_zoomed_flag, 󰊓,} #[fg=#a6e3a1,bg=#111111]"

# Inactive windows: muted gray
set -g window-status-format "#[fg=#6c7086,bg=#111111] #I:#W "

# ── Active / Inactive pane background ─────────────────────────────
# Dims inactive panes when splitting (like iTerm2 pane dimming)
set -g window-active-style "bg=#000000"
set -g window-style "bg=#2a2a2a"

# ── Pane navigation (vim-style) ──────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane borders ──────────────────────────────────────────────────
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# ── Messages ──────────────────────────────────────────────────────
set -g message-style "fg=#cdd6f4,bg=#45475a,bold"
set -g message-command-style "fg=#cdd6f4,bg=#45475a"

# ── Bell & Notifications ─────────────────────────────────────────
set -g visual-bell off
set -g bell-action any
set -g allow-passthrough on
